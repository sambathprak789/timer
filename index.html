<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body>

<div class="app">

  <!-- shown when AudioContext is suspended on load -->
  <div class="audio-banner" id="audioBanner" onclick="unlockAudio()">
    <i class="ti ti-volume"></i>
    Tap here to enable sound
  </div>

  <div class="clock-ring">
    <svg class="ring-svg" viewBox="0 0 260 260" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="130" cy="130" r="120" stroke="rgba(220,220,220,0.08)" stroke-width="1"/>
      <circle cx="130" cy="130" r="120" stroke="#1D9E75" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="753.98" stroke-dashoffset="753.98" id="secRing" transform="rotate(-90 130 130)"/>
      <circle cx="130" cy="130" r="108" stroke="rgba(220,220,220,0.05)" stroke-width="0.5" stroke-dasharray="3 7"/>
      <circle cx="130" cy="130" r="98" stroke="rgba(220,220,220,0.08)" stroke-width="1"/>
      <circle cx="130" cy="130" r="98" stroke="#7F77DD" stroke-width="2.5" stroke-linecap="round"
        stroke-dasharray="615.75" stroke-dashoffset="615.75" id="minRing" transform="rotate(-90 130 130)"/>
    </svg>
    <div class="clock-face">
      <div class="time-display">
        <span id="hh" class="digits">00</span><span class="sep">:</span><span id="mm" class="digits">00</span><span class="sep">:</span><span id="ss" class="digits">00</span>
      </div>
      <div class="ampm-label" id="ampm">AM</div>
      <div class="date-label" id="dateLabel">—</div>
      <div class="status">
        <div class="dot" id="tickDot" title="Tick sound"><i class="ti ti-volume-off"></i></div>
        <div class="dot" id="alertDot" title="Alert"><i class="ti ti-bell"></i></div>
        <div class="dot" id="loopDot" title="Loop"><i class="ti ti-repeat"></i></div>
        <div class="dot" id="alarmDot" title="Alarms"><i class="ti ti-alarm"></i></div>
      </div>
    </div>
  </div>

  <button class="toggle-btn" id="toggleSettingsBtn" onclick="toggleSettings()">
    <i class="ti ti-settings"></i>
    <span id="toggleLabel">Show settings</span>
  </button>

  <div class="settings-panel" id="settingsPanel">

    <div class="section-label">Controls</div>
    <div class="controls-row">
      <button class="btn" id="tickBtn" onclick="toggleTick()">
        <i class="ti ti-volume-off"></i> Tick: Off
      </button>
      <button class="btn" id="alertToggleBtn" onclick="toggleAlert()">
        <i class="ti ti-bell"></i> Alert: Off
      </button>
      <button class="btn" id="loopBtn" onclick="toggleLoop()">
        <i class="ti ti-repeat"></i> Loop: Off
      </button>
    </div>

    <div class="section-label">Alert interval</div>
    <div class="interval-card">
      <div class="interval-header">
        <span class="interval-title">Every <span id="intervalDisplay">30</span><span id="intervalUnit">s</span></span>
        <span class="badge" id="alertBadge"></span>
      </div>
      <div class="row-flex">
        <label>Unit</label>
        <div class="unit-toggle">
          <button class="unit-btn" id="unitSec" onclick="setUnit('sec')">Seconds</button>
          <button class="unit-btn" id="unitMin" onclick="setUnit('min')">Minutes</button>
        </div>
      </div>
      <div class="interval-input-row">
        <label>Interval</label>
        <input class="interval-slider" type="range" min="5" max="300" step="5" value="30" id="intervalSlider" oninput="syncFromSlider(this.value)" style="flex:1;">
        <input class="interval-num" type="number" id="intervalNum" min="5" max="300" value="30" oninput="syncFromNum(this.value)">
        <span class="unit-hint" id="unitHint">sec</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
      <div class="next-label" id="nextLabel">Enable alert to start countdown</div>
    </div>

    <div class="section-label">Alert sound</div>
    <div class="sound-grid">
      <button class="sound-btn" onclick="selectSound('chime')" id="snd-chime">🔔 Chime</button>
      <button class="sound-btn" onclick="selectSound('bell')" id="snd-bell">🛎 Bell</button>
      <button class="sound-btn" onclick="selectSound('pulse')" id="snd-pulse">📡 Pulse</button>
      <button class="sound-btn" onclick="selectSound('zen')" id="snd-zen">🎵 Zen</button>
      <button class="sound-btn" onclick="selectSound('alarm')" id="snd-alarm">⏰ Alarm</button>
      <button class="sound-btn" onclick="selectSound('ping')" id="snd-ping">✨ Ping</button>
    </div>


    <div class="section-label">Alarms</div>

    <div class="alarm-add-row">
      <input type="time" class="alarm-time-input" id="alarmTimeInput" value="07:00">
      <input type="text" class="alarm-label-input" id="alarmLabelInput" placeholder="Label (optional)" maxlength="30">
    </div>

    <!-- Repeat mode -->
    <div class="alarm-repeat-row" id="repeatRow">
      <button class="repeat-preset-btn active" data-preset="once"     onclick="setRepeatPreset('once')">Once</button>
      <button class="repeat-preset-btn"         data-preset="everyday" onclick="setRepeatPreset('everyday')">Every day</button>
      <button class="repeat-preset-btn"         data-preset="weekdays" onclick="setRepeatPreset('weekdays')">Weekdays</button>
      <button class="repeat-preset-btn"         data-preset="weekends" onclick="setRepeatPreset('weekends')">Weekends</button>
      <button class="repeat-preset-btn"         data-preset="custom"   onclick="setRepeatPreset('custom')">Custom</button>
    </div>
    <div class="day-pills" id="dayPillsRow" style="display:none;">
      <button class="day-pill" data-day="0" onclick="toggleDayPill(0)">Su</button>
      <button class="day-pill" data-day="1" onclick="toggleDayPill(1)">Mo</button>
      <button class="day-pill" data-day="2" onclick="toggleDayPill(2)">Tu</button>
      <button class="day-pill" data-day="3" onclick="toggleDayPill(3)">We</button>
      <button class="day-pill" data-day="4" onclick="toggleDayPill(4)">Th</button>
      <button class="day-pill" data-day="5" onclick="toggleDayPill(5)">Fr</button>
      <button class="day-pill" data-day="6" onclick="toggleDayPill(6)">Sa</button>
    </div>

    <div style="display:flex; gap:8px; width:100%;">
      <button class="alarm-cancel-btn" id="alarmCancelBtn" onclick="cancelEdit()"><i class="ti ti-x"></i> Cancel</button>
      <button class="alarm-add-btn" id="alarmAddBtn" onclick="addAlarm()"><i class="ti ti-plus"></i> Add</button>
    </div>

    <div class="alarm-list" id="alarmList">
      <div class="alarm-empty" id="alarmEmpty">
        <i class="ti ti-alarm"></i>
        No alarms set
      </div>
    </div>

  </div>
</div>

<div class="alarm-toast" id="alarmToast">
  <i class="ti ti-alarm"></i>
  <span id="alarmToastText">Alarm!</span>
  <button onclick="dismissToast()" style="background:rgba(255,255,255,0.25);border:none;color:#fff;border-radius:99px;padding:2px 10px;cursor:pointer;font-size:12px;font-family:DM Sans,sans-serif;font-weight:500;">Dismiss</button>
</div>

</body>
</html>
